<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>{{ title if title else "ABSA Demo" }}</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<!-- Free modern Bootstrap theme (Bootswatch) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/minty/bootstrap.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<style>
  :root{
    --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
    --ink: #0b0f19;     /* darker than default */
    --ink2:#000000;
    --muted:#374151;
    --line: rgba(0,0,0,0.12);
    --soft: rgba(0,0,0,0.03);

    --gradA: #6366f1;   /* indigo */
    --gradB: #22c55e;   /* green */
  }

  /* ---------- Global typography ---------- */
  body{
    font-size: 19px;
    color: var(--ink);
  }
  h1,h2,h3,h4,h5{
    color: var(--ink2);
    font-weight: 800;
  }
  .text-muted{ color: var(--muted) !important; }
  .mono{ font-family: var(--mono); }

  .container{ max-width: 1450px; }

  /* ---------- Chips ---------- */
  .chip{
    display:inline-flex;
    gap:.4rem;
    align-items:center;
    padding:.45rem .80rem;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--soft);
    font-size: 1.0rem;
    color: var(--ink2);
    white-space: nowrap;
  }

  /* ---------- Big readable text ---------- */
  .textblock{
    white-space: pre-wrap;
    font-size: 1.18rem;
    line-height: 1.75;
    color: var(--ink2);
    background: rgba(0,0,0,0.025);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px;
  }

  /* ---------- Sticky sidebar ---------- */
  .sticky-col{ position: sticky; top: 16px; }

  /* ---------- Accordion look ---------- */
  .accordion-button{
    font-size: 1.08rem;
    font-weight: 700;
    color: var(--ink2);
  }

  /* ---------- Fancy Top-K progress bars ---------- */
  .kbar{
    height: 14px;
    border-radius: 999px;
    background: rgba(0,0,0,0.08);
    overflow: hidden;
  }
  .kbar .progress-bar{
    border-radius: 999px;
    background: linear-gradient(90deg, var(--gradA), var(--gradB));
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.25);
    transition: width 350ms ease;
  }
  .kbar.striped .progress-bar{
    background-image:
      linear-gradient(90deg, rgba(255,255,255,0.22) 0 12px, rgba(255,255,255,0.0) 12px 24px),
      linear-gradient(90deg, var(--gradA), var(--gradB));
    background-size: 24px 100%, 100% 100%;
    animation: moveStripes 1.1s linear infinite;
  }
  @keyframes moveStripes{
    from { background-position: 0 0, 0 0; }
    to   { background-position: 24px 0, 0 0; }
  }

  /* ---------- Response cards ---------- */
  .resp-card{
    border: 1px solid rgba(0,0,0,0.10);
    border-radius: 16px;
    box-shadow: 0 10px 24px rgba(0,0,0,0.06);
  }
  .resp-title{
    font-weight: 800;
    font-size: 1.05rem;
  }
  .label-strong{
    font-size: 1.05rem;
    font-weight: 800;
    color: var(--ink2);
  }
  .pct{
    font-size: 1.02rem;
    font-weight: 700;
  }
  .kv{
    font-size: 1.02rem;
    font-weight: 700;
  }

  /* ---------- Make badges slightly bigger ---------- */
  .badge{ font-size: 0.95rem; padding: .45rem .65rem; }
</style>
</head>

<body>
<div class="container py-4">
  {% block content %}{% endblock %}
</div>
</body>
</html>
